services:

  mysql:
    image: mysql:8.0
    container_name: salao-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: salao_leila
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s

  app:
    build: .
    container_name: salao-app
    ports:
      - "8081:8081"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/salao_leila?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      DB_USER: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

volumes:
  mysql_data:
