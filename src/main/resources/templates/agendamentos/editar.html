<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Editar Agendamento')}"></head>
<style>
  .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .cal-day {
    aspect-ratio: 1; display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 13px; cursor: pointer; border: 1px solid transparent;
    transition: all .15s;
  }
  .cal-day:hover:not(.disabled):not(.selected) { background: #f3e5f5; border-color: #6a1b9a; }
  .cal-day.today { font-weight: 600; border-color: #6a1b9a; color: #6a1b9a; }
  .cal-day.selected { background: #6a1b9a; color: #fff !important; border-color: #6a1b9a; }
  .cal-day.disabled { color: #ccc; cursor: default; }
  .cal-header { text-align: center; font-size: 12px; font-weight: 600; color: #888; padding: 4px 0; }
  .slot-btn {
    padding: 6px 10px; border-radius: 6px; font-size: 13px; border: 1px solid #dee2e6;
    background: #fff; cursor: pointer; transition: all .15s; min-width: 68px; text-align: center;
  }
  .slot-btn:hover:not(.occupied) { background: #f3e5f5; border-color: #6a1b9a; }
  .slot-btn.occupied { background: #f8f9fa; color: #bbb; cursor: not-allowed; text-decoration: line-through; }
  .slot-btn.selected-slot { background: #6a1b9a; color: #fff; border-color: #6a1b9a; }
</style>
<body class="bg-light">

<nav th:replace="~{fragments/layout :: navbar(${cliente.id})}"></nav>

<div class="container" style="max-width: 820px;">

  <h4 class="mb-1">Editar Agendamento</h4>
  <p class="text-muted mb-4">Altere os serviços ou o horário.</p>

  <form th:action="@{/agendamentos/atualizar}" method="post" id="formEditar">
    <input type="hidden" name="id" th:value="${agendamento.id}">
    <input type="hidden" name="clienteId" th:value="${cliente.id}">
    <input type="hidden" name="dataHora" id="dataHoraInput"
           th:value="${#temporals.format(agendamento.dataHora, 'yyyy-MM-dd''T''HH:mm')}">

    <div class="row g-3">

      <!-- Serviços -->
      <div class="col-lg-5">
        <div class="card shadow-sm h-100">
          <div class="card-body">
            <h6 class="fw-semibold mb-3">1. Serviços</h6>
            <div class="d-flex flex-column gap-2">
              <label th:each="s : ${servicos}"
                     class="d-flex align-items-start gap-2 p-2 border rounded card-servico"
                     th:attr="for='s'+${s.id}" style="cursor:pointer;"
                     th:style="${agendamento.servicos.contains(s)} ? 'border-color:#6a1b9a;background:#f3e5f5;' : ''">
                <input class="form-check-input mt-1 servico-check" type="checkbox"
                       name="servicosIds" th:value="${s.id}" th:id="'s'+${s.id}"
                       th:attr="data-preco=${s.preco},data-dur=${s.duracaoMinutos}"
                       th:checked="${agendamento.servicos.contains(s)}">
                <div class="flex-grow-1">
                  <div class="fw-semibold small" th:text="${s.nome}"></div>
                  <div class="text-muted" style="font-size:11px;" th:text="${s.descricao}"></div>
                </div>
                <div class="text-end text-nowrap">
                  <div class="text-success small fw-semibold" th:text="'R$ '+${s.preco}"></div>
                  <div class="text-muted" style="font-size:11px;" th:text="${s.duracaoMinutos}+'min'"></div>
                </div>
              </label>
            </div>
            <div class="mt-3 pt-2 border-top d-flex justify-content-between small">
              <span class="text-muted">Total: <strong id="totalVal" class="text-dark">R$ 0,00</strong></span>
              <span class="text-muted">Duração: <strong id="totalDur" class="text-dark">0 min</strong></span>
            </div>
          </div>
        </div>
      </div>

      <!-- Calendário -->
      <div class="col-lg-7">
        <div class="card shadow-sm">
          <div class="card-body">
            <h6 class="fw-semibold mb-1">2. Data e Horário</h6>
            <p class="text-muted small mb-3">
              Atual:
              <strong th:text="${#temporals.format(agendamento.dataHora, 'dd/MM/yyyy HH:mm')}"></strong>
              — selecione abaixo para alterar.
            </p>

            <div class="d-flex align-items-center justify-content-between mb-2">
              <button type="button" class="btn btn-sm btn-outline-secondary" onclick="changeMonth(-1)">‹</button>
              <span id="mesAno" class="fw-semibold small"></span>
              <button type="button" class="btn btn-sm btn-outline-secondary" onclick="changeMonth(1)">›</button>
            </div>

            <div class="cal-grid mb-1">
              <div class="cal-header">Dom</div><div class="cal-header">Seg</div>
              <div class="cal-header">Ter</div><div class="cal-header">Qua</div>
              <div class="cal-header">Qui</div><div class="cal-header">Sex</div>
              <div class="cal-header">Sáb</div>
            </div>
            <div class="cal-grid" id="calGrid"></div>

            <div id="slotsArea" class="mt-3" style="display:none;">
              <div class="d-flex align-items-center justify-content-between mb-2">
                <span class="small fw-semibold" id="slotsTitulo"></span>
                <span class="small text-muted">
                  <span class="slot-btn occupied py-0 px-2" style="font-size:11px;text-decoration:none;cursor:default;">Ocupado</span>
                  <span class="slot-btn py-0 px-2 ms-1" style="font-size:11px;cursor:default;">Livre</span>
                </span>
              </div>
              <div id="slotsGrid" class="d-flex flex-wrap gap-2"></div>
              <div id="slotLoading" class="text-muted small mt-2" style="display:none;">Verificando disponibilidade...</div>
            </div>

            <div id="selecaoResumo" class="mt-3 p-2 rounded border border-success bg-light" style="display:none;">
              <span class="small text-success fw-semibold">✓ Novo horário: </span>
              <span class="small fw-semibold" id="selecaoTexto"></span>
            </div>

            <div class="mt-3">
              <label class="form-label small">Observação</label>
              <input type="text" name="observacao" class="form-control form-control-sm"
                     th:value="${agendamento.observacao}">
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="d-flex justify-content-between mt-3">
      <a th:href="@{/agendamentos/historico/{id}(id=${cliente.id})}"
         class="btn btn-outline-secondary">Cancelar</a>
      <button type="submit" class="btn btn-primary">Salvar Alterações</button>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
  const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho',
                 'Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const hoje = new Date(); hoje.setHours(0,0,0,0);

  // Pré-seleciona a data atual do agendamento
  const dataAtual = /*[[${#temporals.format(agendamento.dataHora, 'yyyy-MM-dd')}]]*/ '';
  const horaAtual = /*[[${#temporals.format(agendamento.dataHora, 'HH:mm')}]]*/ '';
  const partes = dataAtual.split('-');
  let viewYear  = parseInt(partes[0]);
  let viewMonth = parseInt(partes[1]) - 1;
  let selectedDate = new Date(viewYear, viewMonth, parseInt(partes[2]));

  function pad(n){ return String(n).padStart(2,'0'); }

  function renderCalendar() {
    document.getElementById('mesAno').textContent = MESES[viewMonth] + ' ' + viewYear;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';
    const primeiro = new Date(viewYear, viewMonth, 1);
    const ultimo   = new Date(viewYear, viewMonth + 1, 0);
    for (let i = 0; i < primeiro.getDay(); i++) grid.appendChild(document.createElement('div'));

    for (let d = 1; d <= ultimo.getDate(); d++) {
      const data = new Date(viewYear, viewMonth, d);
      const div  = document.createElement('div');
      div.className = 'cal-day';
      div.textContent = d;
      const isSunday = data.getDay() === 0;
      const isPast   = data < hoje;
      const isToday  = data.getTime() === hoje.getTime();
      const isSel    = selectedDate &&
        data.getFullYear() === selectedDate.getFullYear() &&
        data.getMonth()    === selectedDate.getMonth() &&
        data.getDate()     === selectedDate.getDate();
      if (isSunday || isPast) {
        div.classList.add('disabled');
        div.title = isSunday ? 'Fechado aos domingos' : 'Data passada';
      } else {
        if (isToday) div.classList.add('today');
        if (isSel)   div.classList.add('selected');
        div.onclick = () => selectDay(viewYear, viewMonth, d);
      }
      grid.appendChild(div);
    }
  }

  function selectDay(y, m, d) {
    selectedDate = new Date(y, m, d);
    renderCalendar();
    loadSlots(y, m, d);
  }

  async function loadSlots(y, m, d) {
    const area   = document.getElementById('slotsArea');
    const grid   = document.getElementById('slotsGrid');
    const titulo = document.getElementById('slotsTitulo');
    const load   = document.getElementById('slotLoading');
    area.style.display = 'block';
    grid.innerHTML = '';
    load.style.display = 'block';
    const dateStr = y + '-' + pad(m+1) + '-' + pad(d);
    titulo.textContent = pad(d) + '/' + pad(m+1) + '/' + y;
    let ocupados = [];
    try {
      const resp = await fetch('/agendamentos/disponibilidade?data=' + dateStr);
      ocupados   = await resp.json();
    } catch(e) {}
    load.style.display = 'none';
    renderSlots(ocupados, dateStr);
  }

  function renderSlots(ocupados, dateStr) {
    const grid = document.getElementById('slotsGrid');
    grid.innerHTML = '';
    const slots = [];
    for (let h = 9; h <= 17; h++) { slots.push(pad(h)+':00'); slots.push(pad(h)+':30'); }
    slots.filter(s => s <= '17:30').forEach(time => {
      const btn = document.createElement('button');
      btn.type = 'button'; btn.className = 'slot-btn'; btn.textContent = time;
      if (ocupados.includes(time)) {
        btn.classList.add('occupied'); btn.disabled = true; btn.title = 'Horário ocupado';
      } else {
        if (time === horaAtual && dateStr === dataAtual) {
          btn.classList.add('selected-slot');
        }
        btn.onclick = () => selectSlot(time, dateStr, btn);
      }
      grid.appendChild(btn);
    });
  }

  function selectSlot(time, dateStr, btn) {
    document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected-slot'));
    btn.classList.add('selected-slot');
    document.getElementById('dataHoraInput').value = dateStr + 'T' + time;
    const [y,m,d] = dateStr.split('-');
    document.getElementById('selecaoTexto').textContent = pad(d)+'/'+pad(m)+'/'+y+' às '+time;
    document.getElementById('selecaoResumo').style.display = 'block';
  }

  function changeMonth(delta) {
    viewMonth += delta;
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    if (viewMonth > 11) { viewMonth = 0;  viewYear++; }
    renderCalendar();
  }

  // Totalizador de serviços
  function atualizarTotais() {
    let val = 0, dur = 0;
    document.querySelectorAll('.servico-check:checked').forEach(x => {
      val += parseFloat(x.dataset.preco); dur += parseInt(x.dataset.dur);
    });
    document.getElementById('totalVal').textContent = 'R$ ' + val.toFixed(2).replace('.',',');
    document.getElementById('totalDur').textContent = dur + ' min';
  }
  document.querySelectorAll('.servico-check').forEach(c => {
    c.addEventListener('change', function() {
      atualizarTotais();
      const label = this.closest('label');
      label.style.borderColor = this.checked ? '#6a1b9a' : '';
      label.style.background  = this.checked ? '#f3e5f5' : '';
    });
  });

  // Inicializa: renderiza calendário e carrega slots do dia atual
  renderCalendar();
  atualizarTotais();
  if (dataAtual) loadSlots(parseInt(partes[0]), parseInt(partes[1])-1, parseInt(partes[2]));
</script>
</body>
</html>
