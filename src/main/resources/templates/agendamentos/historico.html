<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Meus Agendamentos')}"></head>
<body class="bg-light">

<nav class="navbar navbar-dark mb-4" style="background:#6a1b9a;">
  <div class="container">
    <a class="navbar-brand fw-bold" href="/">Cabeleleila Leila</a>
    <div class="d-flex gap-3 align-items-center">
      <span class="text-white small opacity-75"
            th:text="'Olá, ' + ${cliente.nome.split(' ')[0]} + '!'"></span>
      <a href="/clientes/logout" class="text-white text-decoration-none small">Sair</a>
    </div>
  </div>
</nav>

<div class="container">

    <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show" role="alert">
        <span th:text="${sucesso}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show" role="alert">
        <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h4 class="mb-0">Olá, <span th:text="${cliente.nome}">Cliente</span>!</h4>
            <small class="text-muted">Gerencie seus agendamentos</small>
        </div>
        <a th:href="@{/agendamentos/novo/{id}(id=${cliente.id})}" class="btn btn-primary">
            + Novo Agendamento
        </a>
    </div>

    <div th:if="${agendamentos.isEmpty()}" class="text-center py-5">
        <p class="text-muted fs-5">Você ainda não tem agendamentos.</p>
        <a th:href="@{/agendamentos/novo/{id}(id=${cliente.id})}" class="btn btn-primary">
            Agendar agora
        </a>
    </div>

    <div th:unless="${agendamentos.isEmpty()}" class="card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Data e Hora</th>
                        <th>Serviços</th>
                        <th>Valor Total</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="ag : ${agendamentos}">
                        <td th:text="${#temporals.format(ag.dataHora, 'dd/MM/yyyy HH:mm')}"></td>
                        <td>
                            <span th:each="s, iter : ${ag.servicos}">
                                <span th:text="${s.nome}"></span><span th:unless="${iter.last}">, </span>
                            </span>
                        </td>
                        <td>
                            R$ <span th:text="${totais[ag.id]}">0</span>
                        </td>
                        <td>
                            <span class="badge"
                                  th:classappend="${ag.status.name() == 'CONFIRMADO'} ? 'bg-success' :
                                                  (${ag.status.name() == 'CANCELADO'} ? 'bg-danger' :
                                                  (${ag.status.name() == 'CONCLUIDO'} ? 'bg-primary' : 'bg-warning text-dark'))"
                                  th:text="${ag.status}">
                            </span>
                        </td>
                        <td>
                            <a th:href="@{/agendamentos/editar/{id}(id=${ag.id})}"
                               class="btn btn-sm btn-outline-secondary me-1"
                               title="Editar agendamento">Editar</a>
                            <a th:href="@{/agendamentos/detalhe/{id}(id=${ag.id})}"
                               class="btn btn-sm btn-outline-info">Detalhes</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
