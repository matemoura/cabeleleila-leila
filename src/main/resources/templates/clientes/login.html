<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Entrar')}"></head>
<body class="bg-light">

<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
        <div class="card-body p-4">
            <div class="text-center mb-4">
                <img src="/images/logo_leila.png" alt="Cabeleleila Leila" style="height:72px;object-fit:contain;">
                <h2 class="fw-bold mb-0" style="color: #6a1b9a;">Cabeleleila Leila</h2>
                <p class="text-muted small">Salão de Beleza</p>
            </div>

            <!-- Aviso de contexto (ex: veio do botão Agendar) -->
            <div th:if="${aviso}" class="alert alert-info py-2 small text-center"
                 th:text="${aviso}"></div>

            <div th:if="${erro}" class="alert alert-danger py-2 small" th:text="${erro}"></div>
            <div th:if="${sucesso}" class="alert alert-success py-2 small" th:text="${sucesso}"></div>

            <h5 class="mb-3">Acesse sua conta</h5>
            <form th:action="@{/clientes/login}" method="post">
                <!-- Preserva o redirect -->
                <input type="hidden" name="redirectUrl" th:value="${redirectUrl}">

                <div class="mb-3">
                    <label class="form-label">CPF</label>
                    <input type="text" name="cpf" class="form-control" id="cpfLogin"
                           placeholder="000.000.000-00" maxlength="14" required autofocus>
                    <div class="form-text">Use o CPF cadastrado no salão.</div>
                </div>
                <button type="submit" class="btn w-100 fw-semibold"
                        style="background:#6a1b9a;color:white;border:none;">
                    Entrar
                </button>
            </form>

            <hr class="my-3">
            <p class="text-center text-muted small mb-2">Primeira vez aqui?</p>
            <a href="/clientes/novo" class="btn btn-outline-secondary w-100">Criar conta gratuita</a>

            <div class="text-center mt-3">
                <a href="/" class="text-muted small me-3">← Voltar ao início</a>
                <a href="/painel" class="text-muted small">Área da Leila</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const cpfInput = document.getElementById('cpfLogin');
    cpfInput.addEventListener('input', function () {
        let v = this.value.replace(/\D/g, '').substring(0, 11);
        if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/, '$1.$2.$3-$4');
        else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/, '$1.$2.$3');
        else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/, '$1.$2');
        this.value = v;
    });
</script>
</body>
</html>
