<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Estoque')}"></head>
<body class="bg-light">

<nav class="navbar navbar-dark mb-4" style="background:#6a1b9a;">
  <div class="container">
    <span class="navbar-brand fw-bold">Estoque do Salao</span>
    <a href="/estoque" class="text-white text-decoration-none small">&#8592; Voltar ao estoque</a>
  </div>
</nav>

<div class="container" style="max-width:600px;">

  <h4 class="mb-1 fw-semibold" style="color:#6a1b9a;"
      th:text="${item.id == null} ? 'Novo Item no Estoque' : 'Editar Item'"></h4>
  <p class="text-muted mb-4"
     th:text="${item.id == null} ? 'Cadastre um novo produto ou material do salao.' : 'Atualize os dados do item.'"></p>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form th:action="@{/estoque/salvar}" th:object="${item}" method="post">
        <input type="hidden" th:field="*{id}">

        <div class="row g-3">

          <div class="col-12">
            <label class="form-label fw-semibold">Nome do item <span class="text-danger">*</span></label>
            <input type="text" th:field="*{nome}" class="form-control"
                   th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
                   placeholder="Ex: Tinta Louro Dourado, Shampoo 1L...">
            <div class="invalid-feedback" th:errors="*{nome}"></div>
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">Descricao</label>
            <input type="text" th:field="*{descricao}" class="form-control"
                   placeholder="Informacoes adicionais sobre o produto">
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Categoria <span class="text-danger">*</span></label>
            <select th:field="*{categoria}" class="form-select"
                    th:classappend="${#fields.hasErrors('categoria')} ? 'is-invalid'">
              <option value="">Selecione...</option>
              <option th:each="cat : ${categorias}"
                      th:value="${cat.name()}"
                      th:text="${cat.descricao}">
              </option>
            </select>
            <div class="invalid-feedback" th:errors="*{categoria}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Unidade de medida</label>
            <select th:field="*{unidade}" class="form-select">
              <option value="unidade">Unidade</option>
              <option value="litro">Litro</option>
              <option value="ml">Mililitro (ml)</option>
              <option value="kg">Quilograma (kg)</option>
              <option value="g">Grama (g)</option>
              <option value="caixa">Caixa</option>
              <option value="pacote">Pacote</option>
              <option value="frasco">Frasco</option>
            </select>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Quantidade atual <span class="text-danger">*</span></label>
            <input type="number" th:field="*{quantidade}" class="form-control" min="0"
                   th:classappend="${#fields.hasErrors('quantidade')} ? 'is-invalid'"
                   placeholder="0">
            <div class="invalid-feedback" th:errors="*{quantidade}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Estoque minimo <span class="text-danger">*</span></label>
            <input type="number" th:field="*{quantidadeMinima}" class="form-control" min="0"
                   th:classappend="${#fields.hasErrors('quantidadeMinima')} ? 'is-invalid'"
                   placeholder="0">
            <div class="form-text">Abaixo desse valor o painel vai alertar para repor.</div>
            <div class="invalid-feedback" th:errors="*{quantidadeMinima}"></div>
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">Preco unitario (R$)</label>
            <input type="number" th:field="*{precoUnitario}" class="form-control" min="0" step="0.01"
                   placeholder="0,00">
            <div class="form-text">Opcional — para controle de custo.</div>
          </div>

        </div>

        <div class="d-flex justify-content-between mt-4 pt-3 border-top">
          <a href="/estoque" class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn fw-semibold"
                  style="background:#6a1b9a;color:white;border:none;"
                  th:text="${item.id == null} ? 'Cadastrar Item' : 'Salvar Alteracoes'">
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
