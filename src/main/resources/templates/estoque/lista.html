<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Estoque')}"></head>
<body class="bg-light">

<nav class="navbar navbar-dark mb-4" style="background:#6a1b9a;">
  <div class="container">
    <span class="navbar-brand fw-bold">Estoque do Salao</span>
    <div class="d-flex gap-3 align-items-center">
      <a href="/funcionarios" class="text-white text-decoration-none small">Funcionarios</a>
      <a href="/painel" class="text-white text-decoration-none small">Painel</a>
    </div>
  </div>
</nav>

<div class="container" style="max-width:1000px;">

  <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show mb-3">
    <span th:text="${sucesso}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Alerta critico: itens abaixo do minimo -->
  <div th:if="${abaixoMinimo > 0}" class="alert mb-3 d-flex align-items-center gap-2"
       style="background:#fce4ec;border-left:4px solid #c62828;border-radius:8px;">
    <span style="font-size:1.4rem;">&#9888;&#65039;</span>
    <div>
      <strong th:text="${abaixoMinimo} + ' ' + (${abaixoMinimo == 1} ? 'item precisa' : 'itens precisam') + ' de reposicao'"></strong>
      <span class="text-muted small"> — verifique os itens em vermelho abaixo.</span>
    </div>
  </div>

  <!-- Cards de metricas -->
  <div class="row g-3 mb-4">
    <div class="col-4">
      <div class="card shadow-sm border-0 text-center py-3" style="background:#f3e5f5;">
        <div class="small text-muted">Total de itens</div>
        <div class="fs-3 fw-semibold" style="color:#6a1b9a;" th:text="${totalItens}">0</div>
      </div>
    </div>
    <div class="col-4">
      <div class="card shadow-sm border-0 text-center py-3" style="background:#fce4ec;">
        <div class="small text-muted">Abaixo do minimo</div>
        <div class="fs-3 fw-semibold text-danger" th:text="${abaixoMinimo}">0</div>
      </div>
    </div>
    <div class="col-4">
      <div class="card shadow-sm border-0 text-center py-3" style="background:#ffebee;">
        <div class="small text-muted">Sem estoque</div>
        <div class="fs-3 fw-semibold text-danger" th:text="${semEstoque}">0</div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-3">
    <h5 class="mb-0" style="color:#6a1b9a;">Itens em estoque</h5>
    <a href="/estoque/novo" class="btn" style="background:#6a1b9a;color:white;">+ Novo Item</a>
  </div>

  <div th:if="${itens.isEmpty()}" class="card text-center py-5 shadow-sm border-0">
    <div class="card-body">
      <p style="font-size:3rem;opacity:.3;">&#128230;</p>
      <p class="text-muted">Nenhum item no estoque ainda.</p>
      <a href="/estoque/novo" class="btn btn-sm" style="background:#6a1b9a;color:white;">Cadastrar agora</a>
    </div>
  </div>

  <div th:unless="${itens.isEmpty()}" class="card shadow-sm border-0">
    <div class="table-responsive">
      <table class="table table-hover mb-0 align-middle">
        <thead style="background:#f3e5f5;">
          <tr>
            <th style="color:#6a1b9a;">Item</th>
            <th style="color:#6a1b9a;">Categoria</th>
            <th style="color:#6a1b9a;" class="text-center">Estoque atual</th>
            <th style="color:#6a1b9a;" class="text-center">Minimo</th>
            <th style="color:#6a1b9a;" class="text-center">Status</th>
            <th style="color:#6a1b9a;" class="text-center">Ajustar</th>
            <th style="color:#6a1b9a;"></th>
          </tr>
        </thead>
        <tbody>
          <tr th:each="item : ${itens}"
              th:style="${item.abaixoDoMinimo} ? 'background:#fff5f5;' : ''">

            <td>
              <div class="fw-semibold" th:text="${item.nome}"
                   th:style="${item.abaixoDoMinimo} ? 'color:#c62828;' : 'color:#6a1b9a;'"></div>
              <div class="text-muted small" th:if="${item.descricao}" th:text="${item.descricao}"></div>
            </td>

            <td>
              <span class="badge rounded-pill"
                    style="background:#ede7f6;color:#6a1b9a;font-weight:500;"
                    th:text="${item.categoria.descricao}">
              </span>
            </td>

            <td class="text-center fw-bold"
                th:text="${item.quantidade} + ' ' + ${item.unidade}"
                th:style="${item.semEstoque} ? 'color:#c62828;' : (${item.abaixoDoMinimo} ? 'color:#e65100;' : 'color:#2e7d32;')">
            </td>

            <td class="text-center text-muted small"
                th:text="${item.quantidadeMinima} + ' ' + ${item.unidade}">
            </td>

            <td class="text-center">
              <span th:if="${item.semEstoque}"
                    class="badge rounded-pill bg-danger">Sem estoque</span>
              <span th:if="${!item.semEstoque and item.abaixoDoMinimo}"
                    class="badge rounded-pill" style="background:#e65100;color:white;">Repor</span>
              <span th:if="${!item.abaixoDoMinimo}"
                    class="badge rounded-pill bg-success">OK</span>
            </td>

            <!-- Ajuste rapido de quantidade -->
            <td class="text-center">
              <form th:action="@{/estoque/ajustar/{id}(id=${item.id})}" method="post"
                    class="d-flex gap-1 justify-content-center">
                <input type="number" name="quantidade"
                       th:value="${item.quantidade}"
                       class="form-control form-control-sm text-center"
                       style="width:70px;" min="0">
                <button type="submit" class="btn btn-sm" style="background:#6a1b9a;color:white;" title="Salvar">&#10003;</button>
              </form>
            </td>

            <td>
              <a th:href="@{/estoque/editar/{id}(id=${item.id})}"
                 class="btn btn-sm btn-outline-secondary me-1">Editar</a>
              <form th:action="@{/estoque/excluir/{id}(id=${item.id})}" method="post" class="d-inline">
                <button type="submit" class="btn btn-sm btn-outline-danger"
                        onclick="return confirm('Remover este item do estoque?')">Remover</button>
              </form>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
