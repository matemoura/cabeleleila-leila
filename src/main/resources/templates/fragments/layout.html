<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo} + ' | Cabeleleila Leila'">Salao</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; }
        .navbar-brand { font-weight: 700; letter-spacing: .3px; }
        .card-servico { cursor: pointer; transition: border-color .2s, background .2s; }
        .card-servico.selecionado { border-color: #6a1b9a !important; border-width: 2px !important; background: #f3e5f5; }
        .btn-primary { background: #6a1b9a !important; border-color: #6a1b9a !important; }
        .btn-primary:hover { background: #6a1b9a !important; border-color: #6a1b9a !important; }
        .navbar-leila { background: #6a1b9a; }
    </style>
</head>
<body>
<nav th:fragment="navbar(clienteId)" class="navbar navbar-dark mb-4 navbar-leila">
    <div class="container">
        <a class="navbar-brand" href="/">Cabeleleila Leila</a>
        <div>
            <a th:if="${clienteId != null}"
               th:href="@{/agendamentos/historico/{id}(id=${clienteId})}"
               class="text-white text-decoration-none me-3">Meus Agendamentos</a>
            <a href="/clientes/logout" class="text-white text-decoration-none">Sair</a>
        </div>
    </div>
</nav>
</body>
</html>
