<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Agenda do Dia')}"></head>
<style>
  .timeline { position: relative; padding-left: 72px; }
  .timeline::before {
    content: ''; position: absolute; left: 52px; top: 0; bottom: 0;
    width: 2px; background: #e9ecef;
  }
  .timeline-item { position: relative; margin-bottom: 20px; }
  .timeline-hora {
    position: absolute; left: -72px; width: 48px; text-align: right;
    font-size: 13px; font-weight: 600; color: #666; padding-top: 14px;
  }
  .timeline-dot {
    position: absolute; left: -25px; top: 18px;
    width: 12px; height: 12px; border-radius: 50%;
    border: 2px solid #fff; z-index: 1;
  }
  .card-atendimento {
    border-radius: 10px; border: 1px solid #e9ecef;
    background: #fff; padding: 14px 16px;
    transition: box-shadow .15s;
  }
  .card-atendimento:hover { box-shadow: 0 2px 8px rgba(0,0,0,.08); }
  .card-cancelado { opacity: .5; }
  .dot-pendente   { background: #ff9800; }
  .dot-confirmado { background: #2196f3; }
  .dot-concluido  { background: #4caf50; }
  .dot-cancelado  { background: #ccc; }
  .badge-status {
    display: inline-block; padding: 3px 12px; border-radius: 20px; font-size: 12px;
  }
  .badge-pendente   { background: #fff3e0; color: #e65100; }
  .badge-confirmado { background: #e3f2fd; color: #1565c0; }
  .badge-concluido  { background: #e8f5e9; color: #2e7d32; }
  .badge-cancelado  { background: #f5f5f5; color: #9e9e9e; }
  .stat-card { border-radius: 10px; padding: 14px 16px; }
  .avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: #f3e5f5; color: #6a1b9a;
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 16px; flex-shrink: 0;
  }
  .servico-pill {
    background: #f3e5f5; color: #6a1b9a;
    font-size: 11px; padding: 2px 8px;
    border-radius: 20px; display: inline-block;
  }
</style>
<body class="bg-light">

<nav class="navbar navbar-dark mb-4" style="background:#6a1b9a;">
  <div class="container">
    <span class="navbar-brand fw-bold" th:text="'Agenda de ' + ${funcionario.nome}">Agenda</span>
    <div class="d-flex gap-3 align-items-center">
      <a href="/consumo" class="text-white text-decoration-none small">Registrar Consumo</a>
      <a href="/funcionarios/sair" class="text-white text-decoration-none small opacity-75">Sair</a>
    </div>
  </div>
</nav>

<div class="container" style="max-width: 860px;">

  <!-- Flash -->
  <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show mb-3">
    <span th:text="${sucesso}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <!-- Navegação de data -->
  <div class="d-flex align-items-center justify-content-between mb-4">
    <a th:href="@{/agenda(funcionarioId=${funcionario.id},data=${dataAnterior})}" class="btn btn-outline-secondary">
      ‹ <span th:text="${#temporals.format(dataAnterior,'dd/MM')}"></span>
    </a>

    <div class="text-center">
      <h5 class="mb-0 fw-semibold"
          th:text="${#strings.capitalize(#temporals.format(data, 'EEEE', new java.util.Locale('pt','BR')))}
                   + ', ' + ${#temporals.format(data,'dd/MM/yyyy')}">
      </h5>
      <span th:if="${isHoje}" class="badge mt-1" style="background:#6a1b9a;">Hoje</span>
      <a th:unless="${isHoje}" th:href="@{/agenda(funcionarioId=${funcionario.id})}" class="small text-muted text-decoration-none">
        voltar para hoje
      </a>
    </div>

    <a th:href="@{/agenda(funcionarioId=${funcionario.id},data=${dataProxima})}" class="btn btn-outline-secondary">
      <span th:text="${#temporals.format(dataProxima,'dd/MM')}"></span> ›
    </a>
  </div>

  <!-- Estatísticas do dia -->
  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="stat-card" style="background:#f3e5f5;">
        <div class="small text-muted">Total</div>
        <div class="fs-3 fw-semibold" style="color:#6a1b9a;" th:text="${total}">0</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card" style="background:#e8f5e9;">
        <div class="small text-muted">Concluídos</div>
        <div class="fs-3 fw-semibold text-success" th:text="${concluidos}">0</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card" style="background:#fff3e0;">
        <div class="small text-muted">Pendentes</div>
        <div class="fs-3 fw-semibold text-warning" th:text="${pendentes}">0</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card" style="background:#e8f5e9;">
        <div class="small text-muted">Receita realizada</div>
        <div class="fw-semibold text-success">
          R$ <span th:text="${#numbers.formatDecimal(receitaDia, 1, 'POINT', 2, 'COMMA')}">0,00</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Agenda vazia -->
  <div th:if="${agendamentos.isEmpty()}" class="card shadow-sm text-center py-5">
    <div class="card-body">
      <h6 class="text-muted">Nenhum atendimento para este dia.</h6>
      <a th:unless="${isHoje}" th:href="@{/agenda(funcionarioId=${funcionario.id})}" class="btn btn-outline-secondary btn-sm mt-2">
        Ver agenda de hoje
      </a>
    </div>
  </div>

  <!-- Linha do tempo -->
  <div th:unless="${agendamentos.isEmpty()}" class="timeline">
    <div th:each="ag : ${agendamentos}"
         class="timeline-item"
         th:classappend="${ag.status.name() == 'CANCELADO'} ? ' card-cancelado'">

      <!-- Horário na margem -->
      <div class="timeline-hora" th:text="${#temporals.format(ag.dataHora,'HH:mm')}"></div>

      <!-- Ponto colorido na linha -->
      <div class="timeline-dot"
           th:classappend="${ag.status.name() == 'CONFIRMADO'} ? 'dot-confirmado' :
                           (${ag.status.name() == 'CONCLUIDO'}  ? 'dot-concluido'  :
                           (${ag.status.name() == 'CANCELADO'}  ? 'dot-cancelado'  : 'dot-pendente'))">
      </div>

      <!-- Card -->
      <div class="card-atendimento">
        <div class="d-flex justify-content-between align-items-start gap-3 flex-wrap">

          <!-- Esquerda: cliente + serviços -->
          <div class="d-flex align-items-center gap-3">
            <div class="avatar" th:text="${ag.cliente.nome.substring(0,1).toUpperCase()}"></div>
            <div>
              <div class="fw-semibold" th:text="${ag.cliente.nome}"></div>
              <div class="text-muted small" th:text="${ag.cliente.telefone}"></div>
              <div class="mt-1 d-flex flex-wrap gap-1">
                <span th:each="s : ${ag.servicos}" class="servico-pill" th:text="${s.nome}"></span>
              </div>
            </div>
          </div>

          <!-- Direita: duração, valor, status, ações -->
          <div class="text-end d-flex flex-column align-items-end gap-2">

            <div class="text-muted small">
              <span th:text="${#aggregates.sum(ag.servicos.![duracaoMinutos])} + ' min'"></span>
              &nbsp;·&nbsp;
              R$ <span th:text="${#aggregates.sum(ag.servicos.![preco])}"></span>
            </div>

            <span class="badge-status"
                  th:classappend="${ag.status.name() == 'CONFIRMADO'} ? 'badge-confirmado' :
                                  (${ag.status.name() == 'CONCLUIDO'}  ? 'badge-concluido'  :
                                  (${ag.status.name() == 'CANCELADO'}  ? 'badge-cancelado'  : 'badge-pendente'))"
                  th:text="${ag.status}">
            </span>

            <div class="d-flex gap-1"
                 th:unless="${ag.status.name() == 'CANCELADO' or ag.status.name() == 'CONCLUIDO'}">
              <form th:if="${ag.status.name() == 'PENDENTE'}"
                    th:action="@{/agenda/iniciar/{id}(id=${ag.id})}" method="post" class="d-inline">
                <input type="hidden" name="funcionarioId" th:value="${funcionario.id}">
                <input type="hidden" name="data" th:value="${data}">
                <button type="submit" class="btn btn-sm btn-outline-primary">Confirmar</button>
              </form>
              <form th:action="@{/agenda/concluir/{id}(id=${ag.id})}" method="post" class="d-inline">
                <input type="hidden" name="funcionarioId" th:value="${funcionario.id}">
                <input type="hidden" name="data" th:value="${data}">
                <button type="submit" class="btn btn-sm btn-success">✓ Concluir</button>
              </form>
            </div>

            <span th:if="${ag.status.name() == 'CONCLUIDO'}" class="small text-success fw-semibold">
              ✓ Realizado
            </span>
          </div>
        </div>

        <!-- Observação -->
        <div th:if="${ag.observacao != null and !ag.observacao.isEmpty()}"
             class="mt-2 pt-2 border-top small text-muted fst-italic">
          Obs: <span th:text="${ag.observacao}"></span>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
