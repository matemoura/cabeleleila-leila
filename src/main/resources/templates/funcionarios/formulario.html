<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Funcionario')}"></head>
<body class="bg-light">

<nav class="navbar navbar-dark mb-4" style="background:#6a1b9a;">
  <div class="container">
    <span class="navbar-brand fw-bold">Gestao de Funcionarios</span>
    <a href="/funcionarios" class="text-white text-decoration-none small">&#8592; Voltar a lista</a>
  </div>
</nav>

<div class="container" style="max-width:660px;">

  <h4 class="mb-1 fw-semibold" style="color:#6a1b9a;"
      th:text="${funcionario.id == null} ? 'Novo Funcionario' : 'Editar Funcionario'"></h4>
  <p class="text-muted mb-4"
     th:text="${funcionario.id == null} ? 'Preencha os dados do novo funcionario.' : 'Atualize os dados do funcionario.'"></p>

  <div class="card shadow-sm border-0">
    <div class="card-body p-4">
      <form th:action="@{/funcionarios/salvar}" th:object="${funcionario}" method="post">
        <input type="hidden" th:field="*{id}">
        <input type="hidden" th:field="*{ativo}">

        <div class="row g-3">

          <div class="col-12">
            <label class="form-label fw-semibold">Nome completo <span class="text-danger">*</span></label>
            <input type="text" th:field="*{nome}" class="form-control"
                   th:classappend="${#fields.hasErrors('nome')} ? 'is-invalid'"
                   placeholder="Maria das Gracas">
            <div class="invalid-feedback" th:errors="*{nome}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">CPF <span class="text-danger">*</span></label>
            <input type="text" th:field="*{cpf}" class="form-control cpf-input"
                   th:classappend="${#fields.hasErrors('cpf')} ? 'is-invalid'"
                   placeholder="000.000.000-00" maxlength="14">
            <div class="invalid-feedback" th:errors="*{cpf}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Cargo <span class="text-danger">*</span></label>
            <select th:field="*{cargo}" class="form-select"
                    th:classappend="${#fields.hasErrors('cargo')} ? 'is-invalid'">
              <option value="">Selecione...</option>
              <option th:each="c : ${cargos}" th:value="${c.name()}" th:text="${c.descricao}"></option>
            </select>
            <div class="invalid-feedback" th:errors="*{cargo}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Telefone <span class="text-danger">*</span></label>
            <input type="text" th:field="*{telefone}" class="form-control"
                   th:classappend="${#fields.hasErrors('telefone')} ? 'is-invalid'"
                   placeholder="(71) 99999-9999">
            <div class="invalid-feedback" th:errors="*{telefone}"></div>
          </div>

          <div class="col-md-6">
            <label class="form-label fw-semibold">Data de admissao <span class="text-danger">*</span></label>
            <input type="date" th:field="*{dataAdmissao}" class="form-control"
                   th:classappend="${#fields.hasErrors('dataAdmissao')} ? 'is-invalid'">
            <div class="invalid-feedback" th:errors="*{dataAdmissao}"></div>
          </div>

          <div class="col-12">
            <label class="form-label fw-semibold">E-mail <span class="text-danger">*</span></label>
            <input type="email" th:field="*{email}" class="form-control"
                   th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'"
                   placeholder="funcionario@salao.com">
            <div class="invalid-feedback" th:errors="*{email}"></div>
          </div>

          <!-- Servicos que o funcionario realiza -->
          <div class="col-12">
            <label class="form-label fw-semibold">Servicos que realiza</label>
            <div class="row g-2 mt-1">
              <div th:each="servico : ${servicos}" class="col-sm-6">
                <div class="form-check p-0">
                  <label class="d-flex align-items-center gap-2 p-2 rounded border cursor-pointer"
                         style="cursor:pointer; transition: background .15s;"
                         th:classappend="${#lists.contains(funcionario.servicos.![id], servico.id)} ? 'border-primary bg-light' : ''"
                         onmouseover="this.style.background='#f3e5f5'"
                         onmouseout="this.style.background=this.classList.contains('bg-light') ? '' : ''">
                    <input type="checkbox" name="servicosIds"
                           th:value="${servico.id}"
                           class="form-check-input m-0"
                           th:checked="${#lists.contains(funcionario.servicos.![id], servico.id)}"
                           style="accent-color:#6a1b9a;">
                    <span>
                      <span class="fw-semibold small" th:text="${servico.nome}"></span>
                      <span class="text-muted" style="font-size:11px;">
                        — <span th:text="${servico.duracaoMinutos}"></span> min
                      </span>
                    </span>
                  </label>
                </div>
              </div>
            </div>
          </div>

        </div>

        <div class="d-flex justify-content-between mt-4 pt-3 border-top">
          <a href="/funcionarios" class="btn btn-outline-secondary">Cancelar</a>
          <button type="submit" class="btn text-white fw-semibold" style="background:#6a1b9a;border:none;"
                  th:text="${funcionario.id == null} ? 'Cadastrar Funcionario' : 'Salvar Alteracoes'">
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  document.querySelectorAll('.cpf-input').forEach(function(el) {
    el.addEventListener('input', function() {
      let v = this.value.replace(/\D/g,'').substring(0,11);
      if (v.length > 9) v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{1,2})/,'$1.$2.$3-$4');
      else if (v.length > 6) v = v.replace(/(\d{3})(\d{3})(\d{1,3})/,'$1.$2.$3');
      else if (v.length > 3) v = v.replace(/(\d{3})(\d{1,3})/,'$1.$2');
      this.value = v;
    });
  });
</script>
</body>
</html>
