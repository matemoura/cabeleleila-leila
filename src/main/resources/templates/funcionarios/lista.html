<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Funcionarios')}"></head>
<body class="bg-light">

<nav class="navbar navbar-dark mb-4" style="background:#6a1b9a;">
  <div class="container">
    <span class="navbar-brand fw-bold">Gestao de Funcionarios</span>
    <div class="d-flex gap-3">
      <a href="/estoque" class="text-white text-decoration-none small">Estoque</a>
      <a href="/painel" class="text-white text-decoration-none small">Painel</a>
    </div>
  </div>
</nav>

<div class="container" style="max-width:1000px;">

  <div th:if="${sucesso}" class="alert alert-success alert-dismissible fade show mb-3">
    <span th:text="${sucesso}"></span>
    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h4 class="mb-0" style="color:#6a1b9a;">Funcionarios</h4>
      <small class="text-muted">
        <span th:text="${totalAtivos}">0</span> ativos de
        <span th:text="${funcionarios.size()}">0</span> cadastrados
      </small>
    </div>
    <a href="/funcionarios/novo" class="btn text-white" style="background:#6a1b9a;border:none;">+ Novo Funcionario</a>
  </div>

  <div th:if="${funcionarios.isEmpty()}" class="card text-center py-5 shadow-sm border-0">
    <div class="card-body">
      <p style="font-size:2.5rem;opacity:.3;">&#128101;</p>
      <p class="text-muted">Nenhum funcionario cadastrado ainda.</p>
      <a href="/funcionarios/novo" class="btn text-white btn-sm" style="background:#6a1b9a;border:none;">Cadastrar agora</a>
    </div>
  </div>

  <div th:unless="${funcionarios.isEmpty()}" class="row g-3">
    <div th:each="f : ${funcionarios}" class="col-md-6">
      <div class="card border-0 shadow-sm h-100"
           th:style="${!f.ativo} ? 'opacity:.6;' : ''">
        <div class="card-body p-3">

          <!-- Cabecalho -->
          <div class="d-flex align-items-center gap-3 mb-3">
            <div style="width:44px;height:44px;border-radius:50%;
                        background:#ede7f6;color:#6a1b9a;
                        display:flex;align-items:center;justify-content:center;
                        font-weight:700;font-size:16px;flex-shrink:0;"
                 th:text="${f.nome.substring(0,1).toUpperCase()}">
            </div>
            <div>
              <div class="fw-semibold" th:text="${f.nome}" style="color:#6a1b9a;"></div>
              <span style="background:#ede7f6;color:#6a1b9a;font-size:11px;
                           padding:2px 10px;border-radius:20px;"
                    th:text="${f.cargo.descricao}">
              </span>
            </div>
            <div class="ms-auto">
              <span th:if="${f.ativo}" class="badge bg-success">Ativo</span>
              <span th:unless="${f.ativo}" class="badge bg-secondary">Inativo</span>
            </div>
          </div>

          <!-- Contato -->
          <div class="text-muted small mb-2">
            <span th:text="${f.telefone}"></span>
            &nbsp;&middot;&nbsp;
            <span th:text="${f.email}"></span>
          </div>

          <!-- Servicos -->
          <div th:if="${!f.servicos.isEmpty()}" class="mb-3">
            <div class="text-muted" style="font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;">
              Servicos
            </div>
            <div class="d-flex flex-wrap gap-1">
              <span th:each="s : ${f.servicos}"
                    class="badge rounded-pill"
                    style="background:#f3e5f5;color:#6a1b9a;font-weight:500;font-size:11px;"
                    th:text="${s.nome}">
              </span>
            </div>
          </div>
          <div th:if="${f.servicos.isEmpty()}" class="text-muted small mb-3">
            Nenhum servico vinculado
          </div>

          <!-- Acoes -->
          <div class="d-flex gap-2 pt-2 border-top">
            <a th:href="@{/funcionarios/editar/{id}(id=${f.id})}"
               class="btn btn-sm btn-outline-secondary flex-fill">Editar</a>
            <form th:action="@{/funcionarios/toggle/{id}(id=${f.id})}" method="post" class="flex-fill">
              <button type="submit" class="btn btn-sm w-100"
                      th:classappend="${f.ativo} ? 'btn-outline-danger' : 'btn-outline-success'"
                      th:text="${f.ativo} ? 'Desativar' : 'Reativar'"
                      onclick="return confirm('Confirmar alteracao de status?')">
              </button>
            </form>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
