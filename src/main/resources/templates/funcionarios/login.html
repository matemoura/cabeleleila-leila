<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Login')}"></head>
<body style="background:#6a1b9a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;">

<div class="card shadow-lg border-0" style="width:100%;max-width:380px;border-radius:16px;overflow:hidden;">

  <div class="text-center p-4" style="background:#6a1b9a;">
    <img th:src="@{/images/logo_leila.png}" alt="Logo"
         style="width:72px;height:72px;object-fit:contain;">
    <h5 class="text-white fw-bold mt-2 mb-0">Cabeleleila Leila</h5>
    <div class="text-white small" style="opacity:.75;">Area dos funcionarios</div>
  </div>

  <div class="p-4">
    <div th:if="${erro}" class="alert alert-danger py-2 small">
      <span th:text="${erro}"></span>
    </div>

    <form th:action="@{/funcionarios/login}" method="post">
      <div class="mb-3">
        <label class="form-label fw-semibold small">Login</label>
        <input type="text" name="login" class="form-control" placeholder="Seu usuario" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold small">Senha</label>
        <input type="password" name="senha" class="form-control" placeholder="Sua senha" required>
      </div>
      <button type="submit" class="btn w-100 fw-semibold text-white"
              style="background:#6a1b9a;border:none;border-radius:8px;padding:10px;">
        Entrar
      </button>
    </form>

    <div class="text-center mt-3">
      <a href="/" class="text-muted small text-decoration-none">&#8592; Voltar ao site</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
