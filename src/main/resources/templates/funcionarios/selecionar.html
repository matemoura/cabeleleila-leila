<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Agenda')}"></head>
<body class="bg-light">

<nav class="navbar navbar-dark mb-4" style="background:#6a1b9a;">
  <div class="container">
    <span class="navbar-brand fw-bold">Agenda do Dia</span>
    <a href="/painel" class="text-white text-decoration-none small">Painel da Leila</a>
  </div>
</nav>

<div class="container" style="max-width:640px;">

  <div class="text-center mb-4">
    <h4 class="fw-semibold" style="color:#6a1b9a;">Quem e voce?</h4>
    <p class="text-muted">Selecione seu nome para ver os agendamentos do dia.</p>
  </div>

  <div th:if="${funcionarios.isEmpty()}" class="text-center text-muted py-5">
    Nenhum funcionario ativo cadastrado.
  </div>

  <div class="row g-3">
    <div th:each="f : ${funcionarios}" class="col-sm-6">
      <a th:href="@{/agenda(funcionarioId=${f.id})}" class="text-decoration-none">
        <div class="card border-0 shadow-sm h-100"
             style="transition:transform .15s, box-shadow .15s; cursor:pointer;"
             onmouseover="this.style.transform='translateY(-3px)';this.style.boxShadow='0 6px 20px rgba(106,27,154,.15)'"
             onmouseout="this.style.transform='';this.style.boxShadow=''">
          <div class="card-body p-4 text-center">

            <!-- Avatar -->
            <div class="mx-auto mb-3"
                 style="width:56px;height:56px;border-radius:50%;
                        background:#ede7f6;color:#6a1b9a;
                        display:flex;align-items:center;justify-content:center;
                        font-weight:700;font-size:22px;">
              <span th:text="${f.nome.substring(0,1).toUpperCase()}"></span>
            </div>

            <div class="fw-semibold mb-1" style="color:#6a1b9a;" th:text="${f.nome}"></div>
            <div class="mb-3">
              <span style="background:#ede7f6;color:#6a1b9a;font-size:11px;
                           padding:2px 10px;border-radius:20px;"
                    th:text="${f.cargo.descricao}">
              </span>
            </div>

            <!-- Servicos que atende -->
            <div th:if="${!f.servicos.isEmpty()}" class="d-flex flex-wrap gap-1 justify-content-center">
              <span th:each="s : ${f.servicos}"
                    class="badge rounded-pill"
                    style="background:#f3e5f5;color:#6a1b9a;font-size:10px;"
                    th:text="${s.nome}">
              </span>
            </div>
            <div th:if="${f.servicos.isEmpty()}" class="text-muted" style="font-size:12px;">
              Sem servicos vinculados
            </div>

          </div>
        </div>
      </a>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
